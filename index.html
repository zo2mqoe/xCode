<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(KK) KHIT KON</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Kanit', 'Montserrat', sans-serif;
        }
        .font-title {
            font-family: 'Montserrat', 'Kanit', sans-serif;
        }
        .slide-down-fade {
            animation: slideDownFadeOut 1s ease-in-out forwards;
        }
        @keyframes slideDownFadeOut {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100px); opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body class="bg-[#fff0f6] text-gray-700 min-h-screen flex flex-col justify-between selection:bg-pink-200 selection:text-pink-800 relative overflow-x-hidden">

    <audio id="bgMusic" src="Hurry up feat.7Vibes.mp3" loop></audio>

    <div id="splashScreen" class="fixed inset-0 bg-[#fff0f6] z-50 flex flex-col items-center justify-center transition-all duration-500">
        <div id="logoContainer" class="text-center cursor-pointer p-6 flex flex-col items-center gap-4 active:scale-95 transition-transform" onclick="startWebsite()">
            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-white shadow-xl border-4 border-white animate-bounce overflow-hidden flex items-center justify-center">
                <img src="https://i.postimg.cc/c1hz2BLP/KHIT-KON.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <p class="text-pink-500 font-medium text-sm tracking-widest uppercase mt-4 animate-pulse">
                <i class="fa-solid fa-play mr-1"></i> คลิกที่โลโก้เพื่อเข้าสู่เว็บไซต์
            </p>
        </div>
    </div>

    <div class="w-full max-w-3xl mx-auto px-4 py-8 flex-grow flex flex-col justify-center relative z-10">
        <header class="text-center my-6">
            <h1 class="font-title text-2xl md:text-3xl font-bold tracking-widest text-[#d946ef] uppercase drop-shadow-sm">
                (KK) KHIT KON
            </h1>
        </header>

        <div id="homeMenu" class="flex flex-col items-center gap-4 my-8 transition-all duration-300 relative z-20">
            <button onclick="goToPage('unfair')" class="w-full sm:w-72 py-3.5 px-4 bg-white hover:bg-pink-50 text-pink-600 border-2 border-pink-200 rounded-xl text-sm font-semibold tracking-wider uppercase transition-all duration-300 cursor-pointer shadow-sm hover:shadow-[0_0_20px_rgba(217,70,239,0.4)] hover:-translate-y-0.5 active:scale-95">
                KHIT KON GANG
            </button>
            <button onclick="goToPage('winterfell')" class="w-full sm:w-72 py-3.5 px-4 bg-white hover:bg-pink-50 text-pink-600 border-2 border-pink-200 rounded-xl text-sm font-semibold tracking-wider uppercase transition-all duration-300 cursor-pointer shadow-sm hover:shadow-[0_0_20px_rgba(217,70,239,0.4)] hover:-translate-y-0.5 active:scale-95">
                MEMBER (KK)
            </button>
        </div>

        <div id="listPage" class="hidden bg-white rounded-xl border border-pink-100 p-5 md:p-6 shadow-md transition-all duration-300 relative z-20">
            <div class="flex items-center justify-between border-b border-pink-50 pb-4 mb-4">
                <h2 id="listTitle" class="text-xl font-medium text-pink-600">รายชื่อสมาชิก</h2>
                <button onclick="goBackHome()" class="px-3 py-1.5 bg-pink-50 hover:bg-pink-100 text-xs font-medium text-pink-600 rounded-lg border border-pink-200 transition-colors flex items-center gap-1.5 cursor-pointer">
                    <i class="fa-solid fa-arrow-left"></i> ย้อนกลับ
                </button>
            </div>

            <div class="relative mb-5">
                <input type="text" id="searchInput" onkeyup="searchMembers()"
                       class="w-full bg-[#fdf8fa] border border-pink-200 rounded-lg pl-4 pr-10 py-3 text-sm text-gray-700 placeholder-pink-300 focus:outline-none focus:border-pink-400 focus:ring-1 focus:ring-pink-400 transition-all"
                       placeholder="ค้นหาชื่อสมาชิกในกลุ่มนี้...">
                <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-pink-300 text-sm"></i>
                </span>
            </div>

            <div class="space-y-3" id="memberList">
                
                <div class="member-card flex items-center justify-between p-3.5 bg-[#fdf8fa] hover:bg-white border border-pink-100 hover:border-pink-300 rounded-lg transition-all duration-200" data-category="unfair" data-discord-id="1238721926965493830">
                    <div class="flex items-center gap-3.5">
                        <div class="relative flex-shrink-0">
                            <div class="avatar-wrapper w-11 h-11 rounded-full bg-pink-200 border border-pink-300 flex items-center justify-center overflow-hidden">
                                <img class="user-avatar w-full h-full object-cover" src="https://i.postimg.cc/c1hz2BLP/KHIT-KON.png" alt="Owen">
                            </div>
                            <span class="user-status absolute bottom-0 right-0 w-3.5 h-3.5 bg-gray-400 border-2 border-[#fdf8fa] rounded-full shadow-sm"></span>
                        </div>
                        <div>
                            <div class="flex items-center gap-1 flex-wrap">
                                <h3 class="name-field text-sm font-semibold text-gray-800">Owen KK (Owner)</h3>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">tiktok.com/@upze12</p>
                        </div>
                    </div>
                </div>

                <div class="member-card flex items-center justify-between p-3.5 bg-[#fdf8fa] hover:bg-white border border-pink-100 hover:border-pink-300 rounded-lg transition-all duration-200" data-category="winterfell" data-discord-id="ใส่ไอดีดิสคอร์ดคนอื่นตรงนี้">
                    <div class="flex items-center gap-3.5">
                        <div class="relative flex-shrink-0">
                            <div class="avatar-wrapper w-11 h-11 rounded-full bg-pink-100 border border-pink-200 flex items-center justify-center overflow-hidden">
                                <img class="user-avatar w-full h-full object-cover" src="https://i.postimg.cc/c1hz2BLP/KHIT-KON.png" alt="Member">
                            </div>
                            <span class="user-status absolute bottom-0 right-0 w-3.5 h-3.5 bg-gray-400 border-2 border-[#fdf8fa] rounded-full shadow-sm"></span>
                        </div>
                        <div>
                            <div class="flex items-center gap-1 flex-wrap">
                                <h3 class="name-field text-sm font-medium text-gray-800">Theboss KK</h3>
                            </div>
                            <p class="text-xs text-gray-400 mt-0.5">tiktok.com/@theboss_kk</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="w-full text-center py-4 border-t border-pink-100 text-[10px] text-pink-400 tracking-wider font-title mt-auto relative z-10">
        Designed by <span class="text-pink-500 font-medium">Winterfell</span> | Powered by <span class="text-pink-500 font-medium">KINGSMP</span> | © 2025
    </footer>

    <script>
        // ฟังก์ชันแปลงสถานะดิสคอร์ดและแต่งดีไซน์ให้เหมือนต้นฉบับเป๊ะๆ
        function applyDiscordStatus(card, status, avatarId, hash) {
            const statusDot = card.querySelector('.user-status');
            const avatarImg = card.querySelector('.user-avatar');
            const wrapper = card.querySelector('.avatar-wrapper');

            if (!statusDot) return;

            // อัปเดตรูปอวาตาร์ล่าสุดจาก Discord อัตโนมัติ (ถ้ามีรูป)
            if (avatarId && avatarImg) {
                const userId = card.getAttribute('data-discord-id');
                avatarImg.src = `https://cdn.discordapp.com/avatars/${userId}/${avatarId}.png?size=128`;
            }

            // เคลียร์ค่าคลาสและดีไซน์เดิมออกก่อน
            statusDot.className = "user-status absolute bottom-0 right-0 w-3.5 h-3.5 border-2 border-[#fdf8fa] rounded-full shadow-sm flex items-center justify-center overflow-hidden";
            statusDot.style.clipPath = "";
            statusDot.innerHTML = "";
            if (wrapper) wrapper.classList.remove('opacity-60');

            if (status === 'online') {
                statusDot.classList.add('bg-[#23a55a]');
            } else if (status === 'idle') {
                statusDot.classList.add('bg-[#f0b232]');
                statusDot.style.clipPath = "polygon(100% 0, 100% 100%, 0 100%, 0 0, 35% 0, 35% 45%, 100% 45%)";
                statusDot.innerHTML = `<span class="absolute top-[-2px] left-[-2px] w-3 h-3 bg-[#fdf8fa] rounded-full"></span>`;
            } else if (status === 'dnd') {
                statusDot.classList.add('bg-[#f23f43]');
                statusDot.innerHTML = `<span class="w-1.5 h-0.5 bg-white rounded-full"></span>`;
            } else {
                // ออฟไลน์หรือส่องไม่เจอ
                statusDot.classList.add('bg-[#80848e]');
                statusDot.innerHTML = `<span class="w-1.5 h-1.5 bg-[#fdf8fa] rounded-full"></span>`;
                if (wrapper) wrapper.classList.add('opacity-60'); // มืดลงตอนออฟไลน์เหมือนดิสคอร์ดจริง
            }
        }

        // ฟังก์ชันวิ่งไปดึงข้อมูลสดๆ จาก Lanyard API โดยระบุไอดีคนในแก๊ง
        async function loadAllMembersStatus() {
            const cards = document.querySelectorAll('.member-card');
            
            cards.forEach(async (card) => {
                const discordId = card.getAttribute('data-discord-id');
                if (!discordId || discordId.includes('ใส่ไอดี')) return;

                try {
                    const res = await fetch(`https://api.lanyard.rest/v1/users/${discordId}`);
                    const json = await res.json();

                    if (json.success && json.data) {
                        const status = json.data.discord_status; // online, idle, dnd, offline
                        const avatarId = json.data.discord_user.avatar;
                        applyDiscordStatus(card, status, avatarId);
                    }
                } catch (err) {
                    console.error("ส่องสถานะไอดี " + discordId + " พลาด:", err);
                }
            });
        }

        // สั่งให้สแกนสถานะทันทีที่เปิดเว็บ และรีเฟรชออโต้ทุก 15 วินาที
        window.addEventListener('DOMContentLoaded', loadAllMembersStatus);
        setInterval(loadAllMembersStatus, 15000);

        // --- ระบบเปิดปิดและแอนิเมชันหน้าเว็บเดิมของคุณ ---
        let isMusicPlaying = false;
        function startWebsite() {
            const music = document.getElementById('bgMusic');
            const logo = document.getElementById('logoContainer');
            const splash = document.getElementById('splashScreen');
            music.play().then(() => { isMusicPlaying = true; }).catch(err => console.log(err));
            logo.classList.add('slide-down-fade');
            setTimeout(() => { splash.style.opacity = '0'; splash.style.visibility = 'hidden'; setTimeout(() => { splash.remove(); }, 500); }, 1000);
        }

        let currentCategory = 'all';
        function goToPage(category) {
            currentCategory = category;
            document.getElementById('homeMenu').classList.add('hidden');
            const listPage = document.getElementById('listPage');
            listPage.classList.remove('hidden');
            document.getElementById('listTitle').innerText = category === 'unfair' ? "KHIT KON GANG" : "MEMBER (KK)";
            
            const cards = document.getElementsByClassName('member-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].getAttribute('data-category') === category ? "" : "none";
            }
        }
        function goBackHome() { document.getElementById('listPage').classList.add('hidden'); document.getElementById('homeMenu').classList.remove('hidden'); }
        
        function searchMembers() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const cards = document.getElementsByClassName('member-card');
            for (let i = 0; i < cards.length; i++) {
                const matchCat = cards[i].getAttribute('data-category') === currentCategory;
                const matchName = cards[i].querySelector('.name-field').textContent.toLowerCase().includes(filter);
                cards[i].style.display = (matchCat && matchName) ? "" : "none";
            }
        }
    </script>
</body>
</html>
