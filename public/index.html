<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaffPig Dashboard</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 900px;
            margin: auto;
        }
        .btn {
            background: #5865F2;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .btn:hover { background: #4752c4; transform: scale(1.05); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #5865F2;
        }
        .card img { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐷 PaffPig Dashboard</h1>
        <div id="content">
            <p>กรุณาล็อกอินเพื่อจัดการบอท</p>
            <a href="/login" class="btn">Login with Discord</a>
        </div>
    </div>

    <script>
        fetch('/api/user')
            .then(res => res.json())
            .then(user => {
                if (user) {
                    const content = document.getElementById('content');
                    content.innerHTML = `
                        <img src="${user.avatar}" style="width:100px; border-radius:50%; border:3px solid #5865F2;">
                        <h2>ยินดีต้อนรับ, ${user.username}</h2>
                        <div class="grid">
                            ${user.guilds.map(g => `
                                <div class="card">
                                    <img src="${g.icon ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png` : 'https://via.placeholder.com/70'}">
                                    <p>${g.name}</p>
                                    <a href="https://discord.com/api/oauth2/authorize?client_id=1488720371673989221&permissions=8&scope=bot&guild_id=${g.id}" class="btn" style="padding: 5px 15px; font-size: 12px;">ตั้งค่าบอท</a>
                                </div>
                            `).join('')}
                        </div>
                        <br><br>
                        <a href="/logout" style="color: #ff4b2b;">ออกจากระบบ</a>
                    `;
                }
            });
    </script>
</body>
</html>
