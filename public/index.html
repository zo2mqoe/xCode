<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaffPig Bot Dashboard</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            margin-top: 50px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .btn {
            background: #5865F2;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover { background: #4752c4; transform: scale(1.05); }
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .server-item {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
        }
        .server-item img { width: 60px; height: 60px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="glass-card" id="main-content">
        <h1>🐷 PaffPig Dashboard</h1>
        <div id="auth-section">
            <p>กรุณาล็อกอินเพื่อจัดการบอทในเซิร์ฟเวอร์ของคุณ</p>
            <a href="/login" class="btn">Login with Discord</a>
        </div>
    </div>

    <script>
        async function checkUser() {
            const res = await fetch('/api/user');
            const user = await res.json();
            
            if (user) {
                const content = document.getElementById('main-content');
                content.innerHTML = `
                    <img src="${user.avatar}" style="width:80px; border-radius:50%;">
                    <h2>ยินดีต้อนรับ, ${user.username}</h2>
                    <div class="server-grid">
                        ${user.guilds.map(g => `
                            <div class="server-item">
                                <img src="${g.icon ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png` : 'https://via.placeholder.com/60'}">
                                <p>${g.name}</p>
                                <a href="https://discord.com/api/oauth2/authorize?client_id=1488720371673989221&permissions=8&scope=bot&guild_id=${g.id}" class="btn" style="font-size:12px;">จัดการ</a>
                            </div>
                        `).join('')}
                    </div>
                    <br><a href="/logout" style="color:#ffcc00;">Log out</a>
                `;
            }
        }
        checkUser();
    </script>
</body>
</html>
